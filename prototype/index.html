<!DOCTYPE html>
<html lang="zh-Hant" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Apex Win｜娛樂城 H5 Prototype（Demo）</title>

  <!-- PWA（#14）：可安裝 + 離線載入。SW 僅在 http(s)/localhost 生效，file:// 自動略過 -->
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#131312" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Apex Win" />
  <link rel="icon" type="image/svg+xml" href="./icon.svg" />
  <link rel="apple-touch-icon" href="./icon.svg" />

  <!-- 純前端 H5 Prototype：無後端、無資料庫、無建置工具，可直接以瀏覽器開啟 -->
  <link rel="stylesheet" href="./src/styles/tokens.css" />
  <link rel="stylesheet" href="./src/styles/base.css" />
  <link rel="stylesheet" href="./src/styles/components.css" />
</head>
<body>
  <div id="app" aria-busy="true"></div>

  <!--
    classic script + window.HL 全域命名空間。
    原因：本機無 Node / 無可用 Python 靜態伺服器，需支援
    直接用瀏覽器開啟 index.html（file://），避免 ES module 被 CORS 阻擋。
    載入順序代表相依關係，不可任意調換。
  -->
  <!-- Supabase JS SDK（UMD：window.supabase）；未設定 creds 時不使用，維持 Demo 模式 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="./src/core/dom.js"></script>
  <script src="./src/data/mock-data.js"></script>
  <!-- 遊戲登錄表（單一來源 + 動態註冊；seed 自 mock-data，須在其後、views 之前） -->
  <script src="./src/data/games.js"></script>
  <script src="./src/core/app-state.js"></script>
  <!-- 後端資料服務層（在 state 之後、ui/views 之前） -->
  <script src="./src/core/money.js"></script>

  <!-- PWA Service Worker 註冊（僅 http/https；file:// 不支援 SW，略過不報錯） -->
  <script>
    if ("serviceWorker" in navigator && location.protocol.indexOf("http") === 0) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("./sw.js").catch(function (e) { if (window.console) console.warn("[Apex Win] SW 註冊失敗：", e); });
      });
    }
  </script>
